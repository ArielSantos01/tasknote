name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.cz.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ACCESS_TOKEN }}
          ref: main

      - name: Config Git User
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create bump and changelog
        id: cz
        run: |
          python -m pip install -U commitizen
          cz bump --yes
          echo "version=v$(cz version --project)" >> "$GITHUB_OUTPUT"

      - name: Push changes and tags
        run: |
          git push origin main
          git push origin --tags

  build:
    name: Build ${{ matrix.artifact }}
    needs: bump
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: tn-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: tn-macos-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tn-linux-x86_64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.version }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/tasknote ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Release
    needs: [bump, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.version }}

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          gh release create ${{ needs.bump.outputs.version }} \
            tn-macos-arm64 tn-macos-x86_64 tn-linux-x86_64 \
            --title ${{ needs.bump.outputs.version }} \
            --verify-tag \
            --latest \
            --notes-from-tag

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
